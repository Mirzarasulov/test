<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>A & X | Свадебное приглашение</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Parisienne&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #bcd9e8 0%, #d4eaf5 100%);
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .sky-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(ellipse at 30% 40%, #c2e0f0 0%, #aad0e4 60%, #8bbfd8 100%);
            pointer-events: none;
            animation: skyBreathing 12s infinite alternate ease-in-out;
        }
        @keyframes skyBreathing {
            0% { opacity: 0.85; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.02); }
        }

        .moon-glow {
            position: fixed;
            top: 5%;
            right: 8%;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(255,245,220,0.7), rgba(255,240,200,0.2) 60%, transparent 85%);
            border-radius: 50%;
            filter: blur(12px);
            opacity: 0.5;
            pointer-events: none;
            z-index: 1;
            animation: moonPulse 6s infinite alternate;
        }
        @keyframes moonPulse {
            0% { opacity: 0.3; transform: scale(0.98); filter: blur(10px);}
            100% { opacity: 0.7; transform: scale(1.05); filter: blur(15px);}
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
        }
        .particles::before {
            content: "";
            position: fixed;
            width: 200%;
            height: 200%;
            background-image: radial-gradient(circle, rgba(255,255,245,0.7) 1.2px, transparent 1.2px);
            background-size: 70px 70px;
            opacity: 0.4;
            animation: floatStars 35s linear infinite;
        }
        @keyframes floatStars {
            from { transform: translateY(0px) translateX(0px); }
            to { transform: translateY(-140px) translateX(-40px); }
        }

        .cloud-layer {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.08));
        }
        .cloud-drift-1 { animation: floatCloud1 60s infinite alternate ease-in-out; }
        .cloud-drift-2 { animation: floatCloud2 75s infinite alternate ease-in-out; }
        .cloud-drift-3 { animation: floatCloud3 45s infinite alternate ease-in-out; }
        .cloud-drift-4 { animation: floatCloud4 90s infinite alternate ease-in-out; }
        .cloud-drift-5 { animation: floatCloud5 55s infinite alternate ease-in-out; }
        
        @keyframes floatCloud1 {
            0% { transform: translateX(-8%) translateY(-2%) scale(1); }
            100% { transform: translateX(8%) translateY(3%) scale(1.02); }
        }
        @keyframes floatCloud2 {
            0% { transform: translateX(5%) translateY(1%) scale(1); }
            100% { transform: translateX(-5%) translateY(4%) scale(1.03); }
        }
        @keyframes floatCloud3 {
            0% { transform: translateX(-3%) translateY(-1%) scale(1); }
            100% { transform: translateX(12%) translateY(2%) scale(1.01); }
        }
        @keyframes floatCloud4 {
            0% { transform: translateX(0%) translateY(0%) scale(1); }
            100% { transform: translateX(-10%) translateY(5%) scale(1.04); }
        }
        @keyframes floatCloud5 {
            0% { transform: translateX(-5%) translateY(2%) scale(1); }
            100% { transform: translateX(6%) translateY(-2%) scale(1.02); }
        }

        .cloud-svg { width: 100%; height: 100%; display: block; }
        .cloud-svg path { fill: #ffffff; opacity: 0.94; }
        .cloud-1 { width: 820px; height: 520px; top: -12%; left: -25%; position: absolute; }
        .cloud-2 { width: 950px; height: 580px; bottom: -18%; right: -30%; position: absolute; }
        .cloud-3 { width: 720px; height: 440px; top: 8%; right: -15%; position: absolute; }
        .cloud-4 { width: 880px; height: 540px; bottom: 5%; left: -35%; position: absolute; }
        .cloud-5 { width: 650px; height: 400px; top: 42%; left: -5%; position: absolute; }

        .white-glow { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 0; 
            background: radial-gradient(circle at 40% 50%, rgba(255,245,230,0.2) 0%, rgba(255,245,230,0) 70%); 
            pointer-events: none; 
        }
        
        .opening-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 45% 35%, #fff5ec 0%, #ffeadc 100%);
            z-index: 150;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.9s cubic-bezier(0.23, 1, 0.32, 1), visibility 0.9s;
            backdrop-filter: blur(2px);
        }
        .opening-overlay.hide { opacity: 0; visibility: hidden; }
        
        .hero-photo {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1.5rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2), 0 0 0 6px rgba(255,245,235,0.8);
            border: 2px solid rgba(255,255,245,0.9);
            opacity: 0;
            transform: scale(0.92);
            animation: premiumFadeScale 0.9s ease forwards;
        }
        @keyframes premiumFadeScale { to { opacity: 1; transform: scale(1); } }
        
        .names-container {
            text-align: center;
            z-index: 160;
            margin-bottom: 1.8rem;
            opacity: 0;
            transform: translateY(25px);
            animation: premiumFadeUp 0.9s ease 0.15s forwards;
        }
        @keyframes premiumFadeUp { to { opacity: 1; transform: translateY(0); } }
        
        .initials-large {
            font-family: 'Great Vibes', 'Parisienne', cursive;
            font-size: 5rem;
            font-weight: 400;
            background: linear-gradient(135deg, #5e3a2e, #9b6b58);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 0.08em;
        }
        .date-small {
            font-size: 0.85rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: #ae8774;
            margin-top: 0.8rem;
            font-weight: 400;
        }
        
        .open-btn {
            background: rgba(255,248,240,0.96);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(200,165,135,0.6);
            padding: 1rem 2.8rem;
            border-radius: 80px;
            font-family: 'Jost', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #6e4c3c;
            cursor: pointer;
            z-index: 160;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            margin-top: 1rem;
            opacity: 0;
            transform: translateY(25px);
            animation: premiumFadeUp 0.9s ease 0.3s forwards;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .open-btn:active { transform: scale(0.96); }
        
        .anim-cloud {
            position: absolute;
            background: radial-gradient(ellipse at 40% 45%, rgba(255,255,252,0.95) 0%, rgba(250,245,240,0.9) 100%);
            border-radius: 65% 35% 70% 30% / 45% 55% 45% 55%;
            filter: blur(4px);
            opacity: 0;
            transform: scale(0.6);
            will-change: transform, opacity;
            pointer-events: none;
            transition: all 2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 20px 35px rgba(0,0,0,0.05);
        }
        .anim-cloud-1 { width: 620px; height: 380px; top: -8%; left: -38%; }
        .anim-cloud-2 { width: 720px; height: 450px; bottom: -8%; right: -45%; }
        .anim-cloud-3 { width: 550px; height: 330px; top: 25%; left: 30%; }
        .anim-cloud-4 { width: 680px; height: 410px; top: 52%; left: -35%; }
        .anim-cloud-5 { width: 520px; height: 310px; top: -5%; right: -8%; }
        
        .full-invitation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fffef8;
            z-index: 200;
            overflow-y: auto;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s ease, visibility 0.6s;
        }
        .full-invitation.open { opacity: 1; visibility: visible; }
        
        .close-invitation {
            position: fixed;
            top: 18px;
            right: 18px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255,248,242,0.98);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 210;
            border: 0.8px solid rgba(180,140,115,0.4);
            color: #8b6b58;
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
        }
        
        .full-width-img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .info-text-top {
            margin: 24px 20px 16px 20px;
            text-align: center;
            font-size: 17px;
            color: #6b4c35;
            background: white;
            padding: 14px 22px;
            border-radius: 60px;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .location-block {
            position: relative;
            width: 100%;
            display: block;
            background: #1a1a1a;
        }
        
        .location-bg-img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .overlay-dark {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.6));
            z-index: 1;
            pointer-events: none;
        }
        
        .location-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 86%;
            max-width: 420px;
            text-align: center;
            z-index: 2;
        }
        
        .restaurant-name {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 60px;
            margin-bottom: 20px;
            display: inline-block;
        }
        .restaurant-name h2 {
            color: #e8d5b7;
            font-size: 22px;
            letter-spacing: 2px;
            font-weight: 600;
        }
        .restaurant-name p {
            color: white;
            font-size: 14px;
            opacity: 0.9;
        }
        
        .location-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        .location-choice-btn {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(4px);
            color: #b56238;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            padding: 12px 24px;
            border-radius: 60px;
            text-align: center;
            transition: all 0.2s ease;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .location-choice-btn:active { transform: scale(0.96); }
        .location-choice-btn.yandex { background: #ffcc00; color: #000; }
        .location-choice-btn.google { background: #4285f4; color: white; }
        
        .bottom-space {
            height: 20px;
            background: linear-gradient(135deg, #f9e0cf, #fadbc6);
        }
        
        .music-controller {
            position: fixed;
            bottom: 25px;
            right: 20px;
            z-index: 250;
            background: rgba(255,252,245,0.96);
            backdrop-filter: blur(16px);
            border-radius: 60px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 0.6px solid rgba(200,165,135,0.5);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .music-btn { background: none; border: none; font-size: 1.6rem; cursor: pointer; color: #b27760; display: flex; align-items: center; }
        
        @media (max-width: 550px) {
            .location-content { width: 90%; }
            .location-choice-btn { font-size: 14px; padding: 10px 18px; }
            .restaurant-name h2 { font-size: 18px; }
            .initials-large { font-size: 3.6rem; }
            .hero-photo { width: 140px; height: 140px; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sky-bg"></div>
    <div class="white-glow"></div>
    <div class="moon-glow"></div>
    <div class="particles"></div>
    
    <div class="cloud-layer cloud-drift-1 cloud-1"><svg class="cloud-svg" viewBox="0 0 820 520"><path d="M170,260 Q110,180 200,155 Q250,85 355,115 Q445,70 560,120 Q650,85 720,160 Q810,140 830,230 Q890,280 810,360 Q870,440 780,480 Q680,530 560,490 Q470,540 360,500 Q270,540 190,490 Q110,520 70,440 Q25,395 55,320 Q20,270 170,260Z" fill="#ffffff" opacity="0.96"/></svg></div>
    <div class="cloud-layer cloud-drift-2 cloud-2"><svg class="cloud-svg" viewBox="0 0 950 580"><path d="M210,320 Q145,225 255,195 Q315,120 440,150 Q550,95 680,145 Q780,105 860,185 Q960,165 985,265 Q1055,320 965,405 Q1040,495 940,540 Q825,600 695,555 Q590,615 475,570 Q375,615 285,555 Q190,590 135,505 Q78,455 115,370 Q72,315 210,320Z" fill="#ffffff" opacity="0.96"/></svg></div>
    <div class="cloud-layer cloud-drift-3 cloud-3"><svg class="cloud-svg" viewBox="0 0 720 440"><path d="M150,225 Q108,155 195,135 Q245,75 345,105 Q425,65 515,108 Q595,82 645,150 Q730,135 748,215 Q795,260 740,320 Q780,390 720,420 Q655,465 580,440 Q505,475 435,445 Q365,475 310,435 Q258,455 215,400 Q172,420 145,360 Q112,335 138,278 Q108,245 150,225Z" fill="#ffffff" opacity="0.96"/></svg></div>
    <div class="cloud-layer cloud-drift-4 cloud-4"><svg class="cloud-svg" viewBox="0 0 880 540"><path d="M195,290 Q130,200 230,175 Q288,102 405,135 Q510,82 625,135 Q730,95 805,175 Q910,160 935,255 Q1010,310 920,400 Q1000,490 890,535 Q770,600 640,555 Q540,610 425,570 Q320,610 230,560 Q140,590 85,505 Q35,455 75,370 Q30,310 195,290Z" fill="#ffffff" opacity="0.96"/></svg></div>
    <div class="cloud-layer cloud-drift-5 cloud-5"><svg class="cloud-svg" viewBox="0 0 650 400"><path d="M145,210 Q105,145 190,128 Q235,72 325,98 Q400,60 485,100 Q558,75 605,138 Q685,122 702,195 Q750,240 695,295 Q735,365 670,395 Q595,435 520,410 Q445,445 380,412 Q315,440 262,398 Q210,415 175,360 Q142,380 120,325 Q90,298 112,248 Q85,220 145,210Z" fill="#ffffff" opacity="0.96"/></svg></div>

    <div class="opening-overlay" id="openingOverlay">
        <div class="anim-cloud anim-cloud-1"></div>
        <div class="anim-cloud anim-cloud-2"></div>
        <div class="anim-cloud anim-cloud-3"></div>
        <div class="anim-cloud anim-cloud-4"></div>
        <div class="anim-cloud anim-cloud-5"></div>
        <img class="hero-photo" id="heroPhoto" src="https://i.postimg.cc/5NvzBMZm/k21k2.webp" alt="A & X">
        <div class="names-container">
            <div class="initials-large">A & X</div>
            <div class="date-small">15 AUGUST 2026</div>
        </div>
        <button class="open-btn" id="openBtn">Open Invitation</button>
    </div>

    <div class="full-invitation" id="fullInvitation">
        <div class="close-invitation" id="closeInvitationBtn">✕</div>
        <img class="full-width-img" src="https://i.ibb.co/fGzfS3BL/1.jpg" alt="Свадебное фото 1">
        <div class="info-text-top">📅 15 августа 2026 · 16:00<br>💍 Дорогие гости, ждём вас!</div>
        <div class="location-block">
            <img class="location-bg-img" src="https://i.ibb.co/8gkhtB6c/2.jpg" alt="Santini Bar&Terrace">
            <div class="overlay-dark"></div>
            <div class="location-content">
                <div class="restaurant-name"><h2>SANTINI</h2><h2>SANTINI BAR & TERRACE</h2><p>🍽️ Банкетный зал | Терраса</p></div>
                <div class="location-buttons">
                    <a href="https://yandex.uz/maps/-/CPSe7R5R" class="location-choice-btn yandex" target="_blank">🗺️ Яндекс Карты</a>
                    <a href="https://maps.app.goo.gl/nM75CKfD9mjxDS7s5" class="location-choice-btn google" target="_blank">🗺️ Google Карты</a>
                </div>
            </div>
        </div>
        <img class="full-width-img" src="https://i.ibb.co/FLzzMSL4/3.jpg" alt="Свадебное фото 3">
        <div class="bottom-space"></div>
    </div>

    <!-- МУЗЫКА - РАБОЧАЯ ПРЯМАЯ ССЫЛКА -->
    <audio id="bgMusic" loop preload="auto" style="display: none;">
        <source src="https://cdn.pixabay.com/download/audio/2023/05/01/audio_c85c7f3de2.mp3" type="audio/mpeg">
    </audio>
    
    <div class="music-controller" id="musicController">
        <button class="music-btn" id="musicToggleBtn">🎵</button>
    </div>
</div>

<script>
    // МУЗЫКА - ГАРАНТИРОВАННО РАБОТАЕТ
    const audio = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicToggleBtn');
    let isPlaying = false;
    
    function toggleMusic() {
        if (isPlaying) {
            audio.pause();
            isPlaying = false;
            musicBtn.innerHTML = '🎵';
        } else {
            audio.play().then(() => {
                isPlaying = true;
                musicBtn.innerHTML = '🔊';
            }).catch(error => {
                console.log("Ошибка:", error);
            });
        }
    }
    
    musicBtn.addEventListener('click', toggleMusic);
    
    // АНИМАЦИЯ ПРИ ОТКРЫТИИ
    const openingOverlay = document.getElementById('openingOverlay');
    const fullInvitation = document.getElementById('fullInvitation');
    const closeInvBtn = document.getElementById('closeInvitationBtn');
    const openBtn = document.getElementById('openBtn');
    
    let isOpening = false;
    openBtn.addEventListener('click', () => {
        if (isOpening) return;
        isOpening = true;
        
        // Запускаем музыку
        audio.play().then(() => {
            isPlaying = true;
            musicBtn.innerHTML = '🔊';
        }).catch(() => {});
        
        // Анимация облаков
        const animClouds = document.querySelectorAll('.anim-cloud');
        const directions = ['translateX(-700px) translateY(-320px) scale(3.2)', 'translateX(780px) translateY(350px) scale(3.3)', 'translateX(600px) translateY(-420px) scale(3.0)', 'translateX(-650px) translateY(480px) scale(3.1)', 'translateX(520px) translateY(-280px) scale(2.9)'];
        animClouds.forEach((cloud, idx) => { 
            setTimeout(() => { 
                cloud.style.opacity = '1'; 
                cloud.style.transform = directions[idx]; 
                setTimeout(() => cloud.style.opacity = '0', 1900); 
            }, idx * 40); 
        });
        setTimeout(() => { 
            openingOverlay.classList.add('hide'); 
            fullInvitation.classList.add('open'); 
        }, 2100);
    });
    
    closeInvBtn.addEventListener('click', () => fullInvitation.classList.remove('open'));
</script>
</body>
</html>
