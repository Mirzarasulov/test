<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Celeste & Julian | Wedding</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #fff8f0, #fef0e2); font-family: 'Georgia', serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .card { background: rgba(255,255,245,0.7); backdrop-filter: blur(10px); border-radius: 48px; padding: 40px 30px; max-width: 400px; }
        h1 { font-size: 2.5rem; color: #4a2c26; margin-bottom: 10px; }
        p { color: #8b6b58; margin-bottom: 20px; letter-spacing: 2px; }
        button { background: #dccbbc; border: none; padding: 15px 40px; font-size: 16px; border-radius: 60px; color: #4a2c26; cursor: pointer; margin-top: 20px; font-weight: bold; }
        .music-btn { position: fixed; bottom: 20px; right: 20px; background: rgba(255,255,245,0.9); padding: 10px 18px; border-radius: 50px; font-size: 20px; cursor: pointer; border: none; }
        @media (max-width: 500px) { h1 { font-size: 2rem; } }
    </style>
</head>
<body>

<div class="card">
    <h1>Celeste <span style="font-style:italic;">&</span> Julian</h1>
    <p>26 СЕНТЯБРЯ 2026</p>
    <p style="font-size:14px;">Piramit Tower · Istanbul</p>
    <button id="openBtn">✨ Open Invitation ✨</button>
</div>

<button class="music-btn" id="musicBtn">🔇</button>

<audio id="myAudio" loop preload="auto">
    <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
    const audio = document.getElementById('myAudio');
    const openBtn = document.getElementById('openBtn');
    const musicBtn = document.getElementById('musicBtn');
    
    let isPlaying = false;
    let isMuted = true;
    
    // Функция запуска музыки
    function playMusic() {
        audio.play().then(() => {
            isPlaying = true;
            musicBtn.innerHTML = '🔊';
            isMuted = false;
        }).catch(err => {
            console.log("Нажми на кнопку Open Invitation");
        });
    }
    
    // При нажатии на Open Invitation - запускаем музыку
    openBtn.addEventListener('click', () => {
        if (!isPlaying) {
            playMusic();
        }
        openBtn.innerHTML = '💝 Спасибо! 💝';
        openBtn.style.opacity = '0.7';
        
        // Показываем сообщение
        alert('✨ Благодарим за отклик! Скоро пришлём детали ✨');
    });
    
    // Кнопка вкл/выкл звука
    musicBtn.addEventListener('click', () => {
        if (!isPlaying) {
            playMusic();
            return;
        }
        if (isMuted) {
            audio.play();
            musicBtn.innerHTML = '🔊';
            isMuted = false;
        } else {
            audio.pause();
            musicBtn.innerHTML = '🔇';
            isMuted = true;
        }
    });
    
    // Если MP3 не загрузился - покажем подсказку
    audio.addEventListener('error', () => {
        console.log("Файл song.mp3 не найден. Положи файл в ту же папку.");
        const hint = document.createElement('div');
        hint.innerText = '⚠️ Файл song.mp3 не найден. Положи его в ту же папку, что и index.html';
        hint.style.cssText = 'position:fixed; bottom:80px; left:20px; right:20px; background:#333; color:white; padding:10px; border-radius:20px; text-align:center; font-size:12px; z-index:999;';
        document.body.appendChild(hint);
        setTimeout(() => hint.remove(), 5000);
    });
</script>

</body>
</html>
